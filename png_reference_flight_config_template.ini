# PNG参考轨迹分析参数模板
# 用法：
#   python3 generate_png_reference_trajectory.py 03.bag --config png_reference_flight_config_template.ini
#
# 建议每次实机飞行复制一份本文件，例如：
#   png_reference_flight_2026xxxx.ini
# 然后只改本次飞行实际使用的参数。
# 命令行参数会覆盖本文件中的同名参数。

[topics]
# 留空表示自动识别。
ego_pose_topic =
target_pose_topic =
state_topic =
ego_velocity_topic =

[work_segment]
# auto 表示优先选 GUIDED，再选 AUTO。
# 如果确定本次作业段就是 AUTO 或 GUIDED，也可以直接写 AUTO/GUIDED。
work_mode = auto
work_exact = false
# 留空等同于默认第 0 段；同一模式出现多段时再改成 1、2 ...
work_index =

[reference_model]
# 这里尽量填写本次实机飞行 launch/参数服务器里实际使用的值。
dt = 0.05
speed = 5.0
N = 3.0
v_lat_max = 3.0
tau_lat = 0.5

# 旧式 LOS 滤波参数。脚本会按项目代码里的规则映射到 Kalman 噪声参数。
lambda_alpha = 0.2
lambda_window_size = 5

# 如果实机明确设置了 lambda_kalman_*，就在这里填；否则留空。
lambda_kalman_q_position =
lambda_kalman_q_rate =
lambda_kalman_r =

# auto: 优先使用 bag 里的 pose yaw，失败后用参考轨迹运动方向近似。
# bag-yaw: 强制使用 pose yaw。
# course: 不用 pose yaw，只用参考轨迹运动方向。
heading_source = auto

[legacy_compatibility]
# 这些是旧版脚本参数。当前 rpy_png_no_alt 风格模型不使用，
# 保留只是为了旧命令行或旧配置不报错。
k_yaw = 1.5
k_yaw_d = 0.3
max_yaw_rate = 1.0
max_side_step_deg = 30.0

[output]
post_ref_closest_window = 0.5
out_dir =
